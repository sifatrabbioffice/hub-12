name: WinHub
options:
  bundleIdPrefix: com.winhub.emulator
targets:
  WinHub:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [WinHub]
    settings:
      base:
        INFOPLIST_FILE: WinHub/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.winhub.emulator.promax
        MARKETING_VERSION: 2.0
        CURRENT_PROJECT_VERSION: 1
        # Performance & JIT Settings
        ENABLE_BITCODE: NO
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        # Necessary for high-performance rendering
        MTL_ENABLE_DEBUG_INFO: NO
