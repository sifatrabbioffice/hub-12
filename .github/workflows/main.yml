name: WinHub High-Performance Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: brew install xcodegen

      - name: Generate Structure
        run: |
          mkdir -p WinHub
          
          # Create Info.plist with JIT and Controller support
          cat <<'EOF' > WinHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>WinHub</string>
            <key>CFBundleIdentifier</key>
            <string>com.winhub.emulator.promax</string>
            <key>CFBundleName</key>
            <string>WinHub</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>arm64</string>
                <string>metal</string>
            </array>
            <key>GCSupportedGameControllers</key>
            <array>
                <dict>
                    <key>ProfileName</key>
                    <string>ExtendedGamepad</string>
                </dict>
            </array>
            <key>GCSupportsControllerUserInterface</key>
            <true/>
          </dict>
          </plist>
          EOF

          # (The App.swift and project.yml code from above goes here via script or file upload)
          xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project WinHub.xcodeproj \
            -scheme WinHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/WinHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/WinHub.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -qr WinHub_V2_Gaming.ipa Payload

      - name: Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gaming-Hub-Build
          path: build/WinHub_V2_Gaming.ipa
